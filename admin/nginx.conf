server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass ${ADMIN_BACKEND_TARGET}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        location /api/chat/stream {
            proxy_pass ${ADMIN_BACKEND_TARGET}/api/chat/stream;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }

        location /api/card/generate/stream {
            proxy_pass ${ADMIN_BACKEND_TARGET}/api/card/generate/stream;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }

        location /api/customer-service/chat/stream {
            proxy_pass ${ADMIN_BACKEND_TARGET}/api/customer-service/chat/stream;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }
    }

    location /health {
        proxy_pass ${ADMIN_BACKEND_TARGET}/health;
        proxy_set_header Host $host;
    }
}
