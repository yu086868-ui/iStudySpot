server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
  
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 1000ms
      lettuce:
        shutdown-timeout: 100ms
      client-type: lettuce
      connect-timeout: 1000ms
  
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  
  flyway:
    enabled: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ycyu.istudyspotbackend.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: test-secret-key
  expire: 604800

deepseek:
  api:
    key: test-api-key
    url: https://api.deepseek.com/v1
    model: deepseek-chat
    timeout: 60000

logging:
  level:
    com.ycyu.istudyspotbackend: DEBUG
    org.mybatis: DEBUG

sentry:
  dsn: ${SENTRY_DSN:}
  enabled: false

alert:
  error-rate:
    enabled: false
  response-time:
    enabled: false
  service-unavailable:
    enabled: false
