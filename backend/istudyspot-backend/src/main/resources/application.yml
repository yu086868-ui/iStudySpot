server:
  port: 8080
  address: 0.0.0.0

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/iseatspace?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms

  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    encoding: UTF-8
    table: flyway_schema_history
    validate-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ycyu.istudyspotbackend.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: iStudySpotSecretKey2024IsVeryLongAndSecure1234567890
  expire: 604800

# DeepSeek API 配置
deepseek:
  api:
    key: ${DEEPSEEK_API_KEY:sk-xxx}
    url: ${DEEPSEEK_API_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_API_MODEL:deepseek-chat}
    timeout: 60000

logging:
  level:
    com.ycyu.istudyspotbackend: DEBUG
    org.mybatis: DEBUG
    org.springframework.jdbc: DEBUG

sentry:
  dsn: ${SENTRY_DSN:}
  auth-token: ${SENTRY_AUTH_TOKEN:}
  traces-sample-rate: 1.0
  enabled: ${SENTRY_ENABLED:false}

alert:
  error-rate:
    enabled: true
    threshold: 5.0
    window-seconds: 60
  response-time:
    enabled: true
    threshold-ms: 500
  service-unavailable:
    enabled: true
    consecutive-failures: 3
