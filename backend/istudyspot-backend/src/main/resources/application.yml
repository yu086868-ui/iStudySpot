server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/iseatspace?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms

  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    encoding: UTF-8
    table: flyway_schema_history
    validate-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.iseatspace.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: iStudySpotSecretKey2024
  expire: 604800

# DeepSeek API 配置
deepseek:
  api:
    # 从环境变量读取 API Key
    key: ${DEEPSEEK_API_KEY:sk-your-api-key}
    # DeepSeek API URL
    url: https://api.deepseek.com/v1