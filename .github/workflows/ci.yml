name: CI

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'backend/**'

jobs:
  # 后端测试
  backend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: cd backend/istudyspot-backend && mvn -B clean test jacoco:report

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: backend/istudyspot-backend/target/site/jacoco/jacoco.xml
        flags: backend

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-test-results
        path: backend/istudyspot-backend/target/surefire-reports/
