version: 2
updates:
  # GitHub Actions 工作流更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions:
        patterns:
          - "*"

  # Maven 依赖更新（后端）
  - package-ecosystem: "maven"
    directory: "/backend/istudyspot-backend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "backend"
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
      mysql:
        patterns:
          - "com.mysql:*"
      redis:
        patterns:
          - "org.springframework.data:spring-data-redis"
          - "redis.clients:jedis"

  # npm 依赖更新（AI 聊天模块）
  - package-ecosystem: "npm"
    directory: "/miniprogram/ai-chat"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "frontend"
      - "ai-chat"
    groups:
      ai-chat-deps:
        patterns:
          - "*"

  # npm 依赖更新（用户小程序）
  - package-ecosystem: "npm"
    directory: "/miniprogram/mp-user"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "frontend"
      - "mp-user"
    groups:
      mp-user-deps:
        patterns:
          - "*"
